name: Publish VSIX to VS Marketplace

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+') {
            Write-Error "Invalid tag format. Use semantic versioning: v1.0.0"
            exit 1
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version extracted: $version"

      - name: Update version in vsixmanifest
        shell: pwsh
        run: |
          $manifestPath = "src/VsAgentic.VSExtension/source.extension.vsixmanifest"
          $version = "${{ steps.version.outputs.version }}"

          [xml]$manifest = Get-Content $manifestPath
          $manifest.PackageManifest.Metadata.Identity.Version = $version
          $manifest.Save($manifestPath)

          Write-Host "Updated manifest version to: $version"
          Get-Content $manifestPath | Select-String "Version="

      - name: Restore NuGet packages
        run: dotnet restore src/VsAgentic.slnx

      - name: Build VSIX package
        run: dotnet build src/VsAgentic.slnx -c Release -v minimal

      - name: Locate VSIX artifact
        id: vsix
        shell: pwsh
        run: |
          $vsixPath = Get-ChildItem -Path "src/VsAgentic.VSExtension/bin/Release" -Filter "*.vsix" -Recurse | Select-Object -First 1
          if (-not $vsixPath) {
            Write-Error "VSIX file not found in build output"
            exit 1
          }
          echo "path=$($vsixPath.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Found VSIX: $($vsixPath.Name)"

      - name: Publish to VS Marketplace
        shell: pwsh
        run: |
          # Install VsixPublisher from VSSDK BuildTools
          $toolsDir = "$env:RUNNER_TEMP\vssdk"
          nuget install Microsoft.VSSDK.BuildTools -OutputDirectory $toolsDir -ExcludeVersion
          $vsixPublisher = Join-Path $toolsDir "Microsoft.VSSDK.BuildTools\tools\vssdk\bin\VsixPublisher.exe"

          if (-not (Test-Path $vsixPublisher)) {
            Write-Error "VsixPublisher.exe not found at: $vsixPublisher"
            exit 1
          }

          # Fix assembly binding mismatch for System.Runtime.CompilerServices.Unsafe
          # VsixPublisher's telemetry requests v6.0.1.0 but the runner has a different version.
          # Find the actual version shipped alongside VsixPublisher and redirect to it.
          $configPath = "$vsixPublisher.config"
          $vssdkBin = Split-Path $vsixPublisher
          $unsafeAsm = Get-ChildItem -Path $vssdkBin -Filter "System.Runtime.CompilerServices.Unsafe.dll" -Recurse | Select-Object -First 1
          if (-not $unsafeAsm) {
            # Search broader in the VSSDK tools folder
            $unsafeAsm = Get-ChildItem -Path (Split-Path $vssdkBin) -Filter "System.Runtime.CompilerServices.Unsafe.dll" -Recurse | Select-Object -First 1
          }
          if ($unsafeAsm) {
            $actualVersion = [System.Reflection.AssemblyName]::GetAssemblyName($unsafeAsm.FullName).Version.ToString()
            Write-Host "Found System.Runtime.CompilerServices.Unsafe v$actualVersion at $($unsafeAsm.FullName)"
          } else {
            # Fallback: use the version from the runner's .NET Framework GAC
            $actualVersion = "6.0.0.0"
            Write-Host "Unsafe assembly not found in VSSDK, using fallback v$actualVersion"
          }
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <runtime>
              <assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1">
                <probing privatePath="lib" />
                <dependentAssembly>
                  <assemblyIdentity name="System.Runtime.CompilerServices.Unsafe"
                                    publicKeyToken="b03f5f7f11d50a3a" culture="neutral" />
                  <bindingRedirect oldVersion="0.0.0.0-7.0.0.0" newVersion="$actualVersion" />
                </dependentAssembly>
              </assemblyBinding>
            </runtime>
          </configuration>
          "@ | Set-Content $configPath

          # Create a publish manifest in the repo root so overview path resolves
          $publishManifest = Join-Path "${{ github.workspace }}" "publish-manifest.json"
          @"
          {
            "`$schema": "http://json.schemastore.org/vsix-publish",
            "categories": ["programming languages"],
            "identity": {
              "internalName": "VsAgentic"
            },
            "overview": "README.md",
            "publisher": "VsAgentic",
            "repo": "${{ github.server_url }}/${{ github.repository }}"
          }
          "@ | Set-Content $publishManifest

          & $vsixPublisher publish `
            -payload "${{ steps.vsix.outputs.path }}" `
            -publishManifest $publishManifest `
            -personalAccessToken "${{ secrets.MARKETPLACE_PAT }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.vsix.outputs.path }}
          body: |
            ## VsAgentic v${{ steps.version.outputs.version }}

            Published to VS Marketplace

            - Extension ID: VsAgentic.VSExtension.c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
            - Publisher: VsAgentic
            - VS Targets: Visual Studio 2026 (v18.0+)

            [Install from VS Marketplace](https://marketplace.visualstudio.com/items?itemName=VsAgentic.VsAgentic)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        shell: pwsh
        run: |
          Write-Host "========================================" -ForegroundColor Green
          Write-Host "VSIX Published Successfully!" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Green
          Write-Host ""
          Write-Host "Extension Details:" -ForegroundColor Cyan
          Write-Host "  Name:      VsAgentic"
          Write-Host "  Version:   ${{ steps.version.outputs.version }}"
          Write-Host "  Tag:       ${{ github.ref_name }}"
          Write-Host "  VSIX File: ${{ steps.vsix.outputs.path }}"
          Write-Host ""
          Write-Host "Next Steps:" -ForegroundColor Cyan
          Write-Host "  1. Check VS Marketplace: https://marketplace.visualstudio.com/items?itemName=VsAgentic.VsAgentic"
          Write-Host "  2. Review GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          Write-Host ""
