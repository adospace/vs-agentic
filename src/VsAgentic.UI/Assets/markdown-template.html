<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { box-sizing: border-box; }
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: #d4d4d4;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

h1 { font-size: 1.6em; margin: 0.4em 0; color: #e2e2e2; border-bottom: 1px solid #3c3c3c; padding-bottom: 0.2em; }
h2 { font-size: 1.4em; margin: 0.4em 0; color: #e2e2e2; }
h3 { font-size: 1.2em; margin: 0.3em 0; color: #e2e2e2; }
h4, h5, h6 { font-size: 1.05em; margin: 0.3em 0; color: #e2e2e2; }

p { margin: 0.4em 0; }

a { color: #569cd6; text-decoration: none; }
a:hover { text-decoration: underline; }

strong { color: #e2e2e2; }

code {
    background: #3c3c3c;
    padding: 2px 5px;
    border-radius: 3px;
    font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    font-size: 0.9em;
}

pre {
    background: #1e1e1e;
    border: 1px solid #3c3c3c;
    border-radius: 4px;
    padding: 10px 12px;
    margin: 0.5em 0;
    overflow-x: auto;
}
pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: 12px;
    color: #d4d4d4;
}

blockquote {
    border-left: 3px solid #569cd6;
    margin: 0.5em 0;
    padding: 0.2em 0 0.2em 12px;
    color: #9e9e9e;
}

ul, ol { margin: 0.4em 0; padding-left: 1.6em; }
li { margin: 0.15em 0; }

table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
th, td { border: 1px solid #3c3c3c; padding: 6px 10px; text-align: left; }
th { background: #2d2d2d; color: #e2e2e2; }
tr:nth-child(even) { background: #252526; }

hr { border: none; border-top: 1px solid #3c3c3c; margin: 0.6em 0; }

img { max-width: 100%; }

/* First and last element margin cleanup */
body > *:first-child { margin-top: 0; }
body > *:last-child { margin-bottom: 0; }
</style>
<script>{{SHOWDOWN_JS}}</script>
<script>
var converter = new showdown.Converter({
    tables: true,
    tasklists: true,
    strikethrough: true,
    ghCodeBlocks: true,
    simplifiedAutoLink: true,
    literalMidWordUnderscores: true,
    openLinksInNewWindow: true
});

function renderMarkdown(text) {
    if (!text) {
        document.body.innerHTML = '';
    } else {
        document.body.innerHTML = converter.makeHtml(text);
    }
    notifyHeight();
}

function renderHtml(html) {
    document.body.innerHTML = html || '';
    notifyHeight();
}

function notifyHeight() {
    var h = document.body.scrollHeight;
    window.chrome.webview.postMessage(JSON.stringify({type:'height', value:h}));
}

document.addEventListener('wheel', function(e) {
    window.chrome.webview.postMessage(JSON.stringify({type:'wheel', deltaY:e.deltaY}));
    e.preventDefault();
}, {passive:false});
</script>
</head>
<body></body>
</html>
